name: Build SlapMac

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
    
    - name: Check versions
      run: |
        xcodebuild -version
        swift --version
    
    - name: Create Xcode Project
      working-directory: ./src
      run: |
        # Create a proper Xcode project using swift package
        swift package init --type executable --name SlapMac
        
        # Replace Package.swift with our settings
        cat > Package.swift << 'EOF'
// swift-tools-version:5.9
import PackageDescription

let package = Package(
    name: "SlapMac",
    platforms: [.macOS(.v14)],
    products: [
        .executable(name: "SlapMac", targets: ["SlapMac"])
    ],
    targets: [
        .executableTarget(
            name: "SlapMac",
            path: "Sources/SlapMac",
            swiftSettings: [
                .unsafeFlags(["-parse-as-library"])
            ]
        )
    ]
)
EOF
        
        # Move source files to proper location
        mkdir -p Sources/SlapMac
        mv SlapMac/*.swift Sources/SlapMac/ 2>/dev/null || true
        
        ls -la Sources/SlapMac/
    
    - name: Generate sounds (optional)
      working-directory: ./src
      run: |
        mkdir -p sounds
        # Create placeholder sounds (real ones would need 'say' command)
        # For now, app has TTS fallback
      continue-on-error: true
    
    - name: Build with Swift Package Manager
      working-directory: ./src
      run: |
        swift build -c release 2>&1 | tee build.log
        
        # Find the built binary
        find .build -name "SlapMac" -type f
    
    - name: Create App Bundle
      working-directory: ./src
      run: |
        mkdir -p SlapMac.app/Contents/MacOS
        mkdir -p SlapMac.app/Contents/Resources
        
        # Copy binary
        cp .build/release/SlapMac SlapMac.app/Contents/MacOS/ || \
        cp $(find .build -name "SlapMac" -type f | head -1) SlapMac.app/Contents/MacOS/
        
        # Create Info.plist
        cat > SlapMac.app/Contents/Info.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>SlapMac</string>
    <key>CFBundleIdentifier</key>
    <string>com.artyomx.slapmac</string>
    <key>CFBundleName</key>
    <string>SlapMac</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0</string>
    <key>LSUIElement</key>
    <true/>
    <key>LSMinimumSystemVersion</key>
    <string>14.0</string>
</dict>
</plist>
EOF
        
        # Verify
        ls -la SlapMac.app/Contents/MacOS/
        file SlapMac.app/Contents/MacOS/SlapMac
    
    - name: Package DMG
      working-directory: ./src
      run: |
        mkdir -p installer
        cp -r SlapMac.app installer/
        ln -s /Applications installer/Applications
        
        hdiutil create -volname "SlapMac" -srcfolder installer -ov -format UDZO ../SlapMac.dmg
        ls -lh ../SlapMac.dmg
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SlapMac.dmg
        path: SlapMac.dmg
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: SlapMac v${{ github.run_number }}
        files: SlapMac.dmg
        draft: false
        prerelease: true
        body: |
          👋💻 Slap your MacBook. It screams back.
          
          ## Requirements
          - macOS 14.0+ (Sonoma)
          - Apple Silicon Mac (M2/M3/M4 or M1 Pro/Max)
          
          ## Installation
          1. Download `SlapMac.dmg`
          2. Open DMG, drag to Applications
          3. Run: `sudo /Applications/SlapMac.app/Contents/MacOS/SlapMac`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
